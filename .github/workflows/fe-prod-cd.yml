name: CD - PROD (FE)

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  issues: write
  pull-requests: write
  
concurrency:
  group: fe-prod-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    env:
      APP_NAME: "BizKit-FE"
      APP_STAGE: prod
      CLOUD_REPO: "100-hours-a-week/18-team-18TEAM-cloud"
      CLOUD_REPO_REF: "main"


    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      
      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
    
      - name: Semantic Release (prod)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: pnpm semantic-release --extends ./release.config.cjs

      - name: Read version from package.json
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          
          VERSION=$(node -p "require('./package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create .env
        run: |
          cat << 'EOF' > .env
          ${{ secrets.FE_ENV_PROD }}
          EOF

      - name: Configure AWS Credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Buildah
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login to ECR
        shell: bash
        run: |
          set -euo pipefail
          AWS_REGION="${{ secrets.AWS_REGION }}"
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY_FE_PROD }}"
          if [[ -z "${ECR_REPOSITORY}" ]]; then
            ECR_REPOSITORY="bizkit-fe-prod"
          fi

          aws ecr get-login-password --region "${AWS_REGION}" | \
            buildah login --username AWS --password-stdin "${ECR_REGISTRY}"

          if ! aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            aws ecr create-repository --repository-name "${ECR_REPOSITORY}" --region "${AWS_REGION}" >/dev/null
          fi

          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Build and Push FE Container Image
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.value }}"
          IMAGE_TAG="prod-${VERSION}-${GITHUB_SHA::7}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          buildah bud --layers --arch arm64 -f Containerfile -t "${IMAGE_URI}" .

          IMAGE_ARCH="$(buildah inspect --type image --format '{{.Docker.Architecture}}' "${IMAGE_URI}")"
          if [[ "${IMAGE_ARCH}" != "arm64" ]]; then
            echo "Expected arm64 image, got ${IMAGE_ARCH}" >&2
            exit 1
          fi

          buildah push "${IMAGE_URI}"

          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Checkout cloud manifests repository
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ../cloud-repo
          git clone \
            --branch "${CLOUD_REPO_REF}" \
            "https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${CLOUD_REPO}.git" \
            ../cloud-repo

      - name: Update FE manifest in cloud repo
        shell: bash
        run: |
          set -euo pipefail
          export CLOUD_REPO_DIR="${GITHUB_WORKSPACE}/../cloud-repo"
          export IMAGE_URI="${IMAGE_URI}"
          export GIT_SHA="${GITHUB_SHA}"
          export DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export DEPLOYED_BY="${GITHUB_ACTOR}"

          node scripts/update-cloud-fe-manifest.mjs

      - name: Commit and push cloud repo change
        shell: bash
        run: |
          set -euo pipefail
          cd ../cloud-repo

          if git diff --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/fe
          git commit -m "chore(gitops): update fe prod image to ${IMAGE_TAG}"
          git push origin "${CLOUD_REPO_REF}"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MESSAGE="FE PROD CD실패
          Repo: \`${{ github.repository }}\`
          Branch: \`${{ github.head_ref || github.ref_name }}\`
          Workflow: \`${{ github.workflow }}\`
          Job: \`${{ github.job }}\`
          Author: \`${{ github.actor }}\`
          Stage: \`${APP_STAGE}\`
          링크: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          JSON_MESSAGE=$(printf '%s\n' "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps({"content": sys.stdin.read()}))')

          curl -X POST \
              -H "Content-Type: application/json" \
              -d "$JSON_MESSAGE" \
              "$DISCORD_WEBHOOK_URL"
      
      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MESSAGE="✅ FE PROD CD 성공 ✅
          Repo: \`${{ github.repository }}\`
          Branch: \`${{ github.head_ref || github.ref_name }}\`
          Workflow: \`${{ github.workflow }}\`
          Job: \`${{ github.job }}\`
          Author: \`${{ github.actor }}\`
          Stage: \`${APP_STAGE}\`
          링크: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          JSON_MESSAGE=$(printf '%s\n' "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps({"content": sys.stdin.read()}))')

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$JSON_MESSAGE" \
            "$DISCORD_WEBHOOK_URL"
